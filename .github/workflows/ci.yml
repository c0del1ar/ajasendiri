name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install -r docs/requirements.txt

      - name: Run CI Checks
        run: make ci
